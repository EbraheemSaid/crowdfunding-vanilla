<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Campaigns - Admin</title>
    <link rel="stylesheet" href="../css/main.css" />
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
        box-shadow: var(--shadow);
      }
      th,
      td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
      }
      th {
        background-color: var(--text-main);
        color: white;
      }
      .action-buttons {
        display: flex;
        gap: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container" style="margin-top: 40px">
      <h2>Platform Campaigns</h2>

      <table id="campaignsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Creator ID</th>
            <th>Goal</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="campaignsTableBody">
          <tr>
            <td colspan="6">Loading campaigns...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/admin-campaigns.js"></script>
  </body>
</html>
