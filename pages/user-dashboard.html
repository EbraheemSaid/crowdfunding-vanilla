<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard - Crowdfunding</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="container" style="margin-top: 40px">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px">
        <div>
          <h3
            style="
              border-bottom: 2px solid var(--border-color);
              padding-bottom: 10px;
            "
          >
            My Campaigns
          </h3>
          <div
            id="myCampaignsContainer"
            style="
              margin-top: 15px;
              display: flex;
              flex-direction: column;
              gap: 15px;
            "
          >
            <p>Loading your campaigns...</p>
          </div>
        </div>

        <div>
          <h3
            style="
              border-bottom: 2px solid var(--border-color);
              padding-bottom: 10px;
            "
          >
            My Pledges
          </h3>
          <div
            id="myPledgesContainer"
            style="
              margin-top: 15px;
              display: flex;
              flex-direction: column;
              gap: 15px;
            "
          >
            <p>Loading your pledges...</p>
          </div>
        </div>
      </div>

      <div
        id="editModal"
        style="
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.6);
          padding-top: 100px;
        "
      >
        <div
          style="
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            border-radius: var(--radius);
          "
        >
          <h3>Edit Campaign Details</h3>
          <form
            id="editForm"
            style="
              display: flex;
              flex-direction: column;
              gap: 15px;
              margin-top: 15px;
            "
          >
            <input type="hidden" id="editCampaignId" />
            <label style="font-size: 0.9em; font-weight: bold"
              >Update Deadline:</label
            >
            <input
              type="date"
              id="editDeadline"
              required
              style="padding: 10px"
            />
            <label style="font-size: 0.9em; font-weight: bold"
              >Update Description:</label
            >
            <textarea
              id="editDescription"
              required
              rows="4"
              style="padding: 10px"
            ></textarea>

            <div style="display: flex; gap: 10px">
              <button type="submit" class="btn" style="flex: 1">
                Save Changes
              </button>
              <button
                type="button"
                id="closeModalBtn"
                class="btn"
                style="flex: 1; background: var(--text-muted)"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/user-dashboard.js"></script>
  </body>
</html>
